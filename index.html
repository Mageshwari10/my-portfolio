<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mageshwari — Python & Frontend Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root {
    --bg: #0a0a0b;
    --bg2: #111113;
    --bg3: #18181c;
    --border: #2a2a30;
    --amber: #f59e0b;
    --amber-light: #fcd34d;
    --amber-dim: rgba(245,158,11,0.12);
    --text: #f0ede6;
    --muted: #8a8894;
    --accent2: #e879f9;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
  }
  ::selection { background: var(--amber); color: #000; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--amber); border-radius: 2px; }

  /* Noise texture overlay */
  body::before {
    content:''; position:fixed; inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:999; opacity:0.35;
  }

  /* NAV */
  nav {
    position: fixed; top:0; left:0; right:0; z-index:100;
    padding: 1.25rem 2rem;
    display: flex; align-items:center; justify-content:space-between;
    background: rgba(10,10,11,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s;
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size:1.2rem;
    letter-spacing: -0.02em;
    color: var(--amber);
  }
  .nav-links { display:flex; gap:2rem; }
  .nav-links a {
    color: var(--muted); text-decoration:none;
    font-size:0.875rem; font-weight:500;
    letter-spacing:0.05em; text-transform:uppercase;
    transition: color 0.2s;
    position:relative;
  }
  .nav-links a::after {
    content:''; position:absolute; bottom:-4px; left:0; right:0;
    height:1px; background:var(--amber); transform:scaleX(0);
    transition: transform 0.2s; transform-origin:left;
  }
  .nav-links a:hover { color: var(--amber); }
  .nav-links a:hover::after { transform:scaleX(1); }
  .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; }
  .hamburger span { width:24px; height:2px; background:var(--text); border-radius:2px; transition:all 0.3s; }

  /* HERO */
  .hero {
    min-height: 100vh;
    display:flex; align-items:center;
    padding: 7rem 2rem 4rem;
    position:relative; overflow:hidden;
  }
  .hero-grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(245,158,11,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 40%, transparent 100%);
  }
  .hero-glow {
    position:absolute; top:-20%; left:50%; transform:translateX(-50%);
    width:700px; height:700px;
    background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
    pointer-events:none;
  }
  .hero-content { 
    max-width:1100px; margin:0 auto; width:100%; position:relative; 
    display: flex; align-items: center; gap: 4rem;
  }
  .hero-text { flex: 1.2; }
  .hero-image-wrap {
    flex: 0.8; position: relative;
    animation: fadeSlideUp 0.7s 0.3s ease both;
  }
  .hero-image {
    width: 100%; max-width: 400px;
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    transition: transform 0.3s ease;
    filter: grayscale(20%);
  }
  .hero-image:hover { transform: scale(1.02); filter: grayscale(0%); }
  .hero-image-glow {
    position: absolute; inset: -20px;
    background: radial-gradient(circle, var(--amber-dim) 0%, transparent 70%);
    z-index: -1;
  }
  .hero-badge {
    display:inline-flex; align-items:center; gap:0.5rem;
    padding:0.4rem 1rem; border-radius:100px;
    border:1px solid rgba(245,158,11,0.3);
    background: rgba(245,158,11,0.06);
    font-size:0.8rem; font-family:'JetBrains Mono', monospace;
    color:var(--amber); margin-bottom:1.75rem;
    animation: fadeSlideDown 0.6s ease both;
  }
  .hero-badge .dot {
    width:6px; height:6px; border-radius:50%; background:var(--amber);
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .hero h1 {
    font-family:'Syne', sans-serif;
    font-size: clamp(3rem, 8vw, 6.5rem);
    font-weight:800; line-height:0.95;
    letter-spacing:-0.03em;
    animation: fadeSlideUp 0.7s 0.1s ease both;
  }
  .hero h1 .name-line { display:block; }
  .hero h1 .amber { color:var(--amber); }
  .hero-role {
    font-family:'JetBrains Mono', monospace;
    font-size:1rem; color:var(--muted);
    margin: 1.5rem 0 1rem;
    animation: fadeSlideUp 0.7s 0.2s ease both;
  }
  .hero-role span { color:var(--amber-light); }
  .hero-tagline {
    font-size:clamp(1.1rem, 2.5vw, 1.4rem);
    font-weight:300; color:var(--text);
    max-width:580px; line-height:1.5;
    margin-bottom:2.5rem;
    animation: fadeSlideUp 0.7s 0.3s ease both;
  }
  .hero-tagline strong { font-weight:600; }
  .hero-cta { display:flex; gap:1rem; flex-wrap:wrap; animation: fadeSlideUp 0.7s 0.4s ease both; }
  .btn-primary {
    padding:0.85rem 2rem; border-radius:6px;
    background:var(--amber); color:#000;
    font-weight:700; font-size:0.9rem;
    border:none; cursor:pointer; text-decoration:none;
    letter-spacing:0.02em; transition: all 0.2s;
    display:inline-flex; align-items:center; gap:0.5rem;
  }
  .btn-primary:hover { background:var(--amber-light); transform:translateY(-2px); box-shadow:0 8px 24px rgba(245,158,11,0.35); }
  .btn-outline {
    padding:0.85rem 2rem; border-radius:6px;
    background:transparent; color:var(--text);
    font-weight:600; font-size:0.9rem;
    border:1px solid var(--border); cursor:pointer; text-decoration:none;
    letter-spacing:0.02em; transition: all 0.2s;
    display:inline-flex; align-items:center; gap:0.5rem;
  }
  .btn-outline:hover { border-color:var(--amber); color:var(--amber); transform:translateY(-2px); }
  .hero-scroll {
    position:absolute; bottom:2rem; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:0.5rem;
    color:var(--muted); font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase;
    animation: fadeIn 1s 1s ease both;
  }
  .hero-scroll-line { width:1px; height:40px; background:linear-gradient(to bottom, var(--amber), transparent); animation: scrollLine 2s ease infinite; }
  @keyframes scrollLine { 0%{transform:scaleY(0);transform-origin:top} 50%{transform:scaleY(1);transform-origin:top} 51%{transform-origin:bottom} 100%{transform:scaleY(0);transform-origin:bottom} }
  .hero-stats {
    display:flex; gap:3rem; margin-top:3.5rem;
    animation: fadeSlideUp 0.7s 0.5s ease both;
    padding-top:2rem; border-top:1px solid var(--border);
  }
  .stat-num { font-family:'Syne', sans-serif; font-size:2rem; font-weight:800; color:var(--amber); }
  .stat-label { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }

  /* SECTION COMMONS */
  section { padding:6rem 2rem; }
  .section-inner { max-width:1100px; margin:0 auto; }
  .section-label {
    font-family:'JetBrains Mono', monospace;
    font-size:0.75rem; color:var(--amber);
    text-transform:uppercase; letter-spacing:0.15em;
    margin-bottom:0.75rem;
  }
  .section-title {
    font-family:'Syne', sans-serif;
    font-size:clamp(2rem, 5vw, 3.5rem);
    font-weight:800; letter-spacing:-0.03em;
    line-height:1; margin-bottom:1.5rem;
  }
  .divider { width:40px; height:3px; background:var(--amber); border-radius:2px; margin-bottom:3rem; }

  /* ABOUT */
  .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:4rem; align-items:start; }
  .about-text p { color:var(--muted); line-height:1.8; margin-bottom:1.25rem; font-size:1.05rem; }
  .about-text p strong { color:var(--text); font-weight:600; }
  .about-strengths { display:flex; flex-direction:column; gap:1rem; }
  .strength-card {
    padding:1.25rem 1.5rem;
    background:var(--bg3); border:1px solid var(--border);
    border-radius:8px; position:relative; overflow:hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .strength-card:hover { border-color:var(--amber); transform:translateX(4px); }
  .strength-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--amber);
  }
  .strength-card h4 { font-family:'Syne', sans-serif; font-size:1rem; font-weight:700; margin-bottom:0.35rem; }
  .strength-card p { font-size:0.85rem; color:var(--muted); }
  .strength-num { font-family:'JetBrains Mono', monospace; font-size:0.7rem; color:var(--amber); margin-bottom:0.5rem; }

  /* SKILLS */
  .skills-bg { background:var(--bg2); }
  .skills-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:1.5rem; }
  .skill-category {
    background:var(--bg3); border:1px solid var(--border);
    border-radius:12px; padding:1.75rem;
    transition: border-color 0.2s, transform 0.2s;
    position:relative; overflow:hidden;
  }
  .skill-category:hover { border-color:var(--amber); transform:translateY(-4px); }
  .skill-category::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg, rgba(245,158,11,0.03) 0%, transparent 60%);
    pointer-events:none;
  }
  .skill-cat-icon { font-size:1.5rem; margin-bottom:1rem; }
  .skill-cat-title { font-family:'Syne', sans-serif; font-weight:700; font-size:0.95rem; margin-bottom:1rem; letter-spacing:0.02em; }
  .skill-tags { display:flex; flex-wrap:wrap; gap:0.5rem; }
  .skill-tag {
    padding:0.35rem 0.8rem; border-radius:100px;
    border:1px solid var(--border);
    font-size:0.8rem; font-family:'JetBrains Mono', monospace;
    color:var(--muted); background:var(--bg);
    transition: all 0.2s;
  }
  .skill-tag:hover { border-color:var(--amber); color:var(--amber); background:var(--amber-dim); }
  .skill-bar-wrap { margin-top:0.35rem; }
  .skill-bar-label { display:flex; justify-content:space-between; font-size:0.78rem; color:var(--muted); margin-bottom:0.4rem; }
  .skill-bar-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .skill-bar-fill { height:100%; background:linear-gradient(90deg, var(--amber), var(--amber-light)); border-radius:2px; transition:width 1s ease; }

  /* PROJECTS */
  .projects-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:1.5rem; }
  .project-card {
    background:var(--bg3); border:1px solid var(--border);
    border-radius:12px; padding:2rem;
    display:flex; flex-direction:column;
    transition: all 0.3s; position:relative; overflow:hidden;
  }
  .project-card.featured {
    grid-column: span 2;
    background: linear-gradient(135deg, var(--bg3) 0%, rgba(245,158,11,0.04) 100%);
    border-color: rgba(245,158,11,0.3);
  }
  .project-card:hover { border-color:var(--amber); transform:translateY(-6px); box-shadow:0 20px 60px rgba(0,0,0,0.4); }
  .project-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg, transparent, var(--amber), transparent);
    transform:scaleX(0); transition:transform 0.3s;
  }
  .project-card:hover::before { transform:scaleX(1); }
  .project-badge {
    display:inline-flex; align-items:center; gap:0.4rem;
    padding:0.3rem 0.75rem; border-radius:4px;
    font-size:0.7rem; font-family:'JetBrains Mono', monospace;
    margin-bottom:1.25rem; width:fit-content;
  }
  .badge-featured { background:rgba(245,158,11,0.15); color:var(--amber); border:1px solid rgba(245,158,11,0.3); }
  .badge-project { background:var(--bg); color:var(--muted); border:1px solid var(--border); }
  .project-num { font-family:'JetBrains Mono', monospace; font-size:0.7rem; color:var(--amber); margin-bottom:0.5rem; }
  .project-title { font-family:'Syne', sans-serif; font-size:1.3rem; font-weight:700; margin-bottom:0.75rem; }
  .project-desc { color:var(--muted); font-size:0.9rem; line-height:1.7; flex:1; margin-bottom:1.5rem; }
  .project-desc strong { color:var(--text); }
  .project-stack { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:1.5rem; }
  .stack-tag {
    padding:0.2rem 0.6rem; border-radius:4px;
    background:var(--bg); border:1px solid var(--border);
    font-size:0.7rem; font-family:'JetBrains Mono', monospace; color:var(--muted);
  }
  .project-links { display:flex; gap:0.75rem; }
  .proj-link {
    display:inline-flex; align-items:center; gap:0.4rem;
    padding:0.5rem 1rem; border-radius:6px;
    font-size:0.8rem; font-weight:600; text-decoration:none;
    transition: all 0.2s;
  }
  .proj-link-gh { background:var(--bg); border:1px solid var(--border); color:var(--muted); }
  .proj-link-gh:hover { border-color:var(--amber); color:var(--amber); }
  .proj-link-live { background:var(--amber); color:#000; }
  .proj-link-live:hover { background:var(--amber-light); }

  /* EXPERIENCE */
  .exp-bg { background:var(--bg2); }
  .exp-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
  .exp-card {
    background:var(--bg3); border:1px solid var(--border);
    border-radius:12px; padding:1.75rem;
    transition: all 0.2s; position:relative; overflow:hidden;
  }
  .exp-card:hover { border-color:var(--amber); transform:translateY(-3px); }
  .exp-card-type {
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem; color:var(--amber); text-transform:uppercase;
    letter-spacing:0.1em; margin-bottom:0.75rem;
    display:flex; align-items:center; gap:0.5rem;
  }
  .exp-card-type::before { content:''; width:8px; height:8px; border-radius:2px; background:var(--amber); }
  .exp-card h4 { font-family:'Syne', sans-serif; font-weight:700; font-size:1.05rem; margin-bottom:0.5rem; }
  .exp-card p { font-size:0.875rem; color:var(--muted); line-height:1.7; }
  .exp-card .exp-date { font-size:0.75rem; color:var(--muted); margin-top:0.75rem; font-family:'JetBrains Mono', monospace; }

  /* CONTACT */
  .contact-grid { display:grid; grid-template-columns:1fr 1.5fr; gap:4rem; align-items:start; }
  .contact-info-item {
    display:flex; align-items:center; gap:1rem;
    padding:1.25rem; border-radius:8px;
    background:var(--bg3); border:1px solid var(--border);
    text-decoration:none; color:var(--text);
    transition:all 0.2s; margin-bottom:1rem;
  }
  .contact-info-item:hover { border-color:var(--amber); transform:translateX(4px); }
  .contact-icon { width:40px; height:40px; border-radius:8px; background:var(--amber-dim); display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
  .contact-detail-label { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
  .contact-detail-val { font-size:0.9rem; font-weight:500; }
  .form { display:flex; flex-direction:column; gap:1rem; }
  .form-group { display:flex; flex-direction:column; gap:0.4rem; }
  .form-group label { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
  .form-group input, .form-group textarea {
    padding:0.9rem 1.1rem; border-radius:8px;
    background:var(--bg3); border:1px solid var(--border);
    color:var(--text); font-family:'DM Sans', sans-serif; font-size:0.95rem;
    transition: border-color 0.2s, box-shadow 0.2s; outline:none; resize:none;
  }
  .form-group input:focus, .form-group textarea:focus {
    border-color:var(--amber); box-shadow:0 0 0 3px rgba(245,158,11,0.1);
  }
  .form-group input::placeholder, .form-group textarea::placeholder { color:var(--muted); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }

  /* FOOTER */
  footer {
    border-top:1px solid var(--border);
    padding:2.5rem 2rem;
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:1rem;
  }
  .footer-logo { font-family:'Syne', sans-serif; font-weight:800; font-size:1.1rem; color:var(--amber); }
  .footer-text { font-size:0.8rem; color:var(--muted); }
  .footer-links { display:flex; gap:1.5rem; }
  .footer-links a { color:var(--muted); text-decoration:none; font-size:0.8rem; transition:color 0.2s; }
  .footer-links a:hover { color:var(--amber); }

  /* ANIMATIONS */
  @keyframes fadeSlideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeSlideDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .reveal { opacity:0; transform:translateY(32px); transition: opacity 0.65s ease, transform 0.65s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }
  .reveal-delay-1 { transition-delay:0.1s; }
  .reveal-delay-2 { transition-delay:0.2s; }
  .reveal-delay-3 { transition-delay:0.3s; }
  .reveal-delay-4 { transition-delay:0.4s; }

  /* MOBILE */
  @media(max-width:768px) {
    .nav-links { display:none; }
    .hamburger { display:flex; }
    .hero-content { flex-direction: column; text-align: center; gap: 3rem; padding-top: 5rem; }
    .hero-image-wrap { order: -1; width: 100%; max-width: 300px; margin: 0 auto; }
    .hero-badge, .hero-cta, .hero-stats { justify-content: center; }
    .hero-tagline { margin: 0 auto 2.5rem; }
    .about-grid, .contact-grid, .exp-grid { grid-template-columns:1fr; gap:2rem; }
    .project-card.featured { grid-column:span 1; }
    .hero-stats { gap:1.5rem; flex-wrap:wrap; }
    .form-row { grid-template-columns:1fr; }
    footer { flex-direction:column; text-align:center; }
    .footer-links { justify-content:center; }
    nav { padding:1rem 1.25rem; }
    .mobile-menu {
      display:flex; flex-direction:column; gap:0; position:fixed;
      top:60px; left:0; right:0; background:rgba(10,10,11,0.97);
      backdrop-filter:blur(16px); border-bottom:1px solid var(--border);
      padding:1rem 0; z-index:99;
    }
    .mobile-menu a { padding:0.9rem 2rem; color:var(--muted); text-decoration:none; font-size:0.9rem; border-bottom:1px solid var(--border); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

const NavBar = () => {
  const [open, setOpen] = useState(false);
  const links = ['About','Skills','Projects','Experience','Contact'];
  return (
    <nav>
      <div className="nav-logo">M.R.</div>
      <div className="nav-links">
        {links.map(l => <a key={l} href={`#${l.toLowerCase()}`}>{l}</a>)}
      </div>
      <div className="hamburger" onClick={() => setOpen(!open)}>
        <span></span><span></span><span></span>
      </div>
      {open && (
        <div className="mobile-menu">
          {links.map(l => <a key={l} href={`#${l.toLowerCase()}`} onClick={() => setOpen(false)}>{l}</a>)}
        </div>
      )}
    </nav>
  );
};

const Hero = () => (
  <section className="hero" id="hero">
    <div className="hero-grid"></div>
    <div className="hero-glow"></div>
    <div className="hero-content">
      <div className="hero-text">
        <div className="hero-badge"><span className="dot"></span>Available for opportunities</div>
        <h1>
          <span className="name-line">MAGESH</span>
          <span className="name-line amber">WARI R</span>
        </h1>
        <p className="hero-role">
