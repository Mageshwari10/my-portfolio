<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mageshwari R — Software Development Engineer & Full Stack Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    corePlugins: { preflight: false },
    theme: { extend: {} }
  }
</script>
<script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
<style>
  :root {
    --bg: #F5F9FF;
    --bg2: #E8F1FE;
    --bg3: #EBF0FE;
    --border: rgba(139,92,246,0.15);
    --amber: #8B5CF6;
    --amber-light: #38BDF8;
    --amber-dim: rgba(139,92,246,0.08);
    --text: #0F172A;
    --muted: #475569;
    --accent2: #06B6D4;
    --purple: #8B5CF6;
    --blue: #38BDF8;
    --cyan: #06B6D4;
    --pink: #EC4899;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: linear-gradient(135deg, #F5F9FF 0%, #E0F2FE 35%, #F3E8FF 70%, #FDF4FF 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    position: relative;
    min-height: 100vh;
  }
  ::selection { background: var(--purple); color: #fff; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: rgba(139,92,246,0.1); }
  ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #8B5CF6, #38BDF8); border-radius: 2px; }

  /* Aurora twinkling stars overlay */
  body::before {
    content:''; position:fixed; inset:0;
    background: radial-gradient(1px 1px at 20% 30%, rgba(139,92,246,0.5), rgba(139,92,246,0)),
                radial-gradient(1px 1px at 60% 70%, rgba(56,189,248,0.5), rgba(56,189,248,0)),
                radial-gradient(1px 1px at 50% 50%, rgba(6,182,212,0.5), rgba(6,182,212,0));
    background-size: 200% 200%;
    pointer-events:none; z-index:999; opacity:0.08;
    animation: twinkling 8s linear infinite;
  }
  @keyframes twinkling { 0%{opacity:0.05} 50%{opacity:0.15} 100%{opacity:0.05} }

  /* Ambient cursor-tracking glow — aurora effect */
  .cursor-glow {
    position: fixed; top:0; left:0; z-index:1;
    width: 480px; height: 480px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(56,189,248,0.08) 45%, transparent 75%);
    pointer-events: none;
    transform: translate(-50%,-50%);
    transition: opacity 0.4s ease;
    will-change: transform;
    box-shadow: 0 0 120px rgba(139,92,246,0.15), 0 0 200px rgba(56,189,248,0.1);
  }
  @media (max-width:768px) { .cursor-glow { display:none; } }
  @media (prefers-reduced-motion: reduce) {
    .cursor-glow { display:none; }
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  /* Site-wide ambient glow orbs — cinematic backdrop, sits behind all content */
  .ambient-field { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .ambient-orb {
    position:absolute; border-radius:50%; filter:blur(10px);
    animation: ambientDrift ease-in-out infinite, pulse 6s ease infinite;
    will-change: transform;
  }
  @keyframes ambientDrift {
    0%   { transform: translate(0,0) scale(1); }
    33%  { transform: translate(40px,-30px) scale(1.08); }
    66%  { transform: translate(-30px,20px) scale(0.95); }
    100% { transform: translate(0,0) scale(1); }
  }
  @media (max-width:768px) { .ambient-field { display:none; } }

  /* NAV */
  .nav-wrap {
    position: fixed; top:1.25rem; left:0; right:0; z-index:100;
    display:flex; justify-content:center; padding:0 1.5rem;
    animation: navDrop 0.7s 0.1s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes navDrop { from{opacity:0; transform:translateY(-24px)} to{opacity:1; transform:translateY(0)} }
  nav {
    width:100%; max-width:1100px;
    padding: 0.65rem 0.65rem 0.65rem 1.5rem;
    display: flex; align-items:center; justify-content:space-between;
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(139,92,246,0.25);
    border-radius: 100px;
    box-shadow: 0 8px 40px rgba(139,92,246,0.1), inset 0 1px 0 rgba(255,255,255,0.6);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  nav:hover { border-color: rgba(139,92,246,0.4); box-shadow: 0 8px 50px rgba(139,92,246,0.15), inset 0 1px 0 rgba(255,255,255,0.7); }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size:1.05rem;
    letter-spacing: -0.01em;
    background: linear-gradient(90deg, #8B5CF6, #38BDF8);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    display:flex; align-items:center; gap:0.5rem;
  }
  .nav-logo .logo-dot { width:8px; height:8px; border-radius:50%; background:linear-gradient(90deg, #8B5CF6, #38BDF8); box-shadow:0 0 12px rgba(139,92,246,0.5); animation:pulse 2.4s ease infinite; }
  .nav-links { display:flex; gap:0.25rem; align-items:center; padding:0.25rem; }
  .nav-links a {
    color: var(--muted); text-decoration:none;
    font-size:0.8rem; font-weight:600;
    letter-spacing:0.04em; text-transform:uppercase;
    transition: color 0.3s, letter-spacing 0.3s, background 0.3s;
    position:relative; padding:0.55rem 1.1rem; border-radius:100px;
  }
  .nav-links a:hover { color: var(--text); letter-spacing:0.08em; background: rgba(139,92,246,0.12); }
  .nav-cta {
    display:flex; align-items:center; gap:0.6rem;
    padding:0.6rem 1.3rem; border-radius:100px;
    background: linear-gradient(90deg, rgba(139,92,246,0.15), rgba(56,189,248,0.1));
    border:1px solid rgba(139,92,246,0.35);
    color:#8B5CF6; font-size:0.78rem; font-weight:700;
    letter-spacing:0.05em; text-transform:uppercase;
    text-decoration:none; transition: all 0.3s;
  }
  .nav-cta:hover { background:linear-gradient(90deg, rgba(139,92,246,0.25), rgba(56,189,248,0.2)); border-color:rgba(139,92,246,0.5); transform:translateY(-1px); box-shadow:0 6px 20px rgba(139,92,246,0.25); }
  .nav-cta .status-dot { width:6px; height:6px; border-radius:50%; background:#4ade80; box-shadow:0 0 8px #4ade80; animation:pulse 1.8s ease infinite; }
  .hamburger {
    display:none; align-items:center; gap:0.5rem; cursor:pointer;
    padding:0.6rem 1rem; border-radius:100px;
    background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.25);
    color:var(--amber-light); font-size:0.7rem; font-weight:700; letter-spacing:0.08em;
  }
  .hamburger-dots { display:grid; grid-template-columns:1fr 1fr; gap:3px; width:12px; height:12px; }
  .hamburger-dots span { width:4px; height:4px; border-radius:50%; background:var(--amber-light); transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  .hamburger.open .hamburger-dots span:nth-child(1) { transform: translate(4px,4px) rotate(45deg) scale(1.4); }
  .hamburger.open .hamburger-dots span:nth-child(2) { transform: translate(-4px,4px) rotate(-45deg) scale(1.4); }
  .hamburger.open .hamburger-dots span:nth-child(3) { transform: translate(4px,-4px) rotate(-45deg) scale(1.4); }
  .hamburger.open .hamburger-dots span:nth-child(4) { transform: translate(-4px,-4px) rotate(45deg) scale(1.4); }

  .mobile-overlay {
    position:fixed; inset:0; z-index:90;
    background: radial-gradient(circle at 50% 30%, rgba(245,158,11,0.08), rgba(8,8,10,0.97) 65%);
    backdrop-filter: blur(24px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:0.5rem;
    animation: overlayFade 0.4s ease both;
  }
  @keyframes overlayFade { from{opacity:0} to{opacity:1} }
  .mobile-overlay a {
    font-family:'Syne', sans-serif; font-size:1.6rem; font-weight:700;
    color:rgba(240,237,230,0.55); text-decoration:none;
    padding:0.7rem 0; letter-spacing:-0.01em;
    transition: color 0.3s, letter-spacing 0.3s, transform 0.3s;
    opacity:0; transform:translateY(16px);
    animation: overlayItem 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .mobile-overlay a:hover { color:var(--text); letter-spacing:0.02em; transform:scale(1.04); }
  @keyframes overlayItem { to{ opacity:1; transform:translateY(0); } }

  /* HERO */
  .hero {
    min-height: 100vh;
    display:flex; align-items:center;
    padding: 7rem 2rem 4rem;
    position:relative; overflow:hidden;
  }
  .hero-grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(245,158,11,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 40%, transparent 100%);
  }
  .hero-glow {
    position:absolute; top:-20%; left:50%; transform:translateX(-50%);
    width:700px; height:700px;
    background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
    pointer-events:none;
  }
  .hero-content { max-width:1100px; margin:0 auto; width:100%; position:relative; display:grid; grid-template-columns:1.15fr 0.85fr; gap:3rem; align-items:center; }
  .hero-text { min-width:0; }
  .hero-photo-col { display:flex; justify-content:center; align-items:center; position:relative; }
  .hero-photo-ring {
    position:relative; width:min(360px, 80vw); aspect-ratio:1/1;
    border-radius:50%;
    animation: fadeIn 1s 0.3s ease both;
  }
  .hero-photo-ring::before {
    content:''; position:absolute; inset:-14px; border-radius:50%;
    background: conic-gradient(from 0deg, var(--amber), var(--accent2), var(--amber-light), var(--amber));
    animation: spinRing 8s linear infinite;
    filter: blur(0.5px);
  }
  .hero-photo-ring::after {
    content:''; position:absolute; inset:-14px; border-radius:50%;
    background: conic-gradient(from 0deg, var(--amber), var(--accent2), var(--amber-light), var(--amber));
    filter: blur(28px); opacity:0.55;
    animation: spinRing 8s linear infinite, pulse 3s ease infinite;
  }
  @keyframes spinRing { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .hero-photo-inner {
    position:absolute; inset:6px; border-radius:50%;
    overflow:hidden; background:var(--bg2);
    border:3px solid var(--bg);
    box-shadow: 0 0 0 1px rgba(245,158,11,0.2), 0 20px 60px rgba(0,0,0,0.5);
  }
  .hero-photo-inner img { width:100%; height:100%; object-fit:cover; display:block; }
  .hero-photo-badge {
    position:absolute; bottom:6%; right:2%;
    display:flex; align-items:center; gap:0.5rem;
    padding:0.5rem 1rem; border-radius:100px;
    background:rgba(18,18,22,0.85); backdrop-filter:blur(12px);
    border:1px solid rgba(245,158,11,0.3);
    font-family:'JetBrains Mono', monospace; font-size:0.72rem; color:var(--amber-light);
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
    animation: floatBadge 4s ease-in-out infinite;
  }
  @keyframes floatBadge { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @media(max-width:900px) {
    .hero-content { grid-template-columns:1fr; gap:2.5rem; text-align:center; }
    .hero-photo-col { order:-1; }
    .hero-cta { justify-content:center; }
    .hero-stats { justify-content:center; }
  }
  .hero-badge {
    display:inline-flex; align-items:center; gap:0.5rem;
    padding:0.4rem 1rem; border-radius:100px;
    border:1px solid rgba(245,158,11,0.3);
    background: rgba(245,158,11,0.06);
    font-size:0.8rem; font-family:'JetBrains Mono', monospace;
    color:var(--amber); margin-bottom:1.75rem;
    animation: fadeSlideDown 0.6s ease both;
  }
  .hero-badge .dot, .hero-photo-badge .dot {
    width:6px; height:6px; border-radius:50%; background:var(--amber);
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .hero h1 {
    font-family:'Syne', sans-serif;
    font-size: clamp(3rem, 8vw, 6.5rem);
    font-weight:800; line-height:0.95;
    letter-spacing:-0.03em;
    animation: fadeSlideUp 0.7s 0.1s ease both;
  }
  .hero h1 .name-line { display:block; }
  .hero h1 .amber {
    background: linear-gradient(100deg, var(--amber) 0%, var(--amber-light) 35%, var(--accent2) 60%, var(--amber) 100%);
    background-size: 300% 100%;
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
    animation: gradientShift 6s ease infinite;
  }
  @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  .hero-role {
    font-family:'JetBrains Mono', monospace;
    font-size:1rem; color:var(--muted);
    margin: 1.5rem 0 1rem;
    min-height: 1.4em;
    animation: fadeSlideUp 0.7s 0.2s ease both;
  }
  .hero-role span { color:var(--amber-light); }
  .hero-role .cursor-blink { display:inline-block; width:2px; height:1em; background:var(--amber); margin-left:2px; vertical-align:-2px; animation: blink 0.9s step-end infinite; }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  /* Floating particles in hero */
  .hero-particles { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .particle {
    position:absolute; bottom:-20px; border-radius:50%;
    background: var(--amber); opacity:0.35;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0); opacity:0; }
    10% { opacity:0.5; }
    90% { opacity:0.3; }
    100% { transform: translateY(-110vh) translateX(var(--drift, 30px)); opacity:0; }
  }
  .hero-tagline {
    font-size:clamp(1.1rem, 2.5vw, 1.4rem);
    font-weight:300; color:var(--text);
    max-width:580px; line-height:1.5;
    margin-bottom:2.5rem;
    animation: fadeSlideUp 0.7s 0.3s ease both;
  }
  .hero-tagline strong { font-weight:600; }
  .hero-cta { display:flex; gap:1rem; flex-wrap:wrap; animation: fadeSlideUp 0.7s 0.4s ease both; }
  .btn-primary {
    padding:0.85rem 2rem; border-radius:6px;
    background:linear-gradient(90deg, #8B5CF6, #38BDF8); color:#fff;
    font-weight:700; font-size:0.9rem;
    border:none; cursor:pointer; text-decoration:none;
    letter-spacing:0.02em; transition: all 0.25s;
    display:inline-flex; align-items:center; gap:0.5rem;
    position:relative;
  }
  .btn-primary:hover { background:linear-gradient(90deg, #7C3AED, #0EA5E9); transform:translateY(-2px); box-shadow:0 8px 28px rgba(139,92,246,0.35); }
  .btn-primary:active { transform:translateY(0) scale(0.98); }
  .btn-outline {
    padding:0.85rem 2rem; border-radius:6px;
    background:transparent; color:var(--text);
    font-weight:600; font-size:0.9rem;
    border:1px solid var(--border); cursor:pointer; text-decoration:none;
    letter-spacing:0.02em; transition: all 0.2s;
    display:inline-flex; align-items:center; gap:0.5rem;
  }
  .btn-outline:hover { border-color:#8B5CF6; color:#8B5CF6; transform:translateY(-2px); }
  .hero-scroll {
    position:absolute; bottom:2rem; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:0.5rem;
    color:var(--muted); font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase;
    animation: fadeIn 1s 1s ease both;
  }
  .hero-scroll-line { width:1px; height:40px; background:linear-gradient(to bottom, #8B5CF6, transparent); animation: scrollLine 2s ease infinite; }
  @keyframes scrollLine { 0%{transform:scaleY(0);transform-origin:top} 50%{transform:scaleY(1);transform-origin:top} 51%{transform-origin:bottom} 100%{transform:scaleY(0);transform-origin:bottom} }
  .hero-stats {
    display:flex; gap:3rem; margin-top:3.5rem;
    animation: fadeSlideUp 0.7s 0.5s ease both;
    padding-top:2rem; border-top:1px solid var(--border);
  }
  .stat-num { font-family:'Syne', sans-serif; font-size:2rem; font-weight:800; background:linear-gradient(90deg, #8B5CF6, #38BDF8); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .stat-label { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }

  /* SECTION COMMONS */
  section { padding:6rem 2rem; position:relative; z-index:2; }
  .section-inner { max-width:1100px; margin:0 auto; }
  .section-label {
    font-family:'JetBrains Mono', monospace;
    font-size:0.75rem; color:#8B5CF6;
    text-transform:uppercase; letter-spacing:0.15em;
    margin-bottom:0.75rem;
  }
  .section-title {
    font-family:'Syne', sans-serif;
    font-size:clamp(2rem, 5vw, 3.5rem);
    font-weight:800; letter-spacing:-0.03em;
    line-height:1; margin-bottom:1.5rem;
    background:linear-gradient(90deg, #8B5CF6, #38BDF8);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .divider { width:40px; height:3px; background:linear-gradient(90deg, #8B5CF6, #38BDF8); border-radius:2px; margin-bottom:3rem; }

  /* ABOUT */
  .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:4rem; align-items:start; }
  .about-text p { color:var(--muted); line-height:1.8; margin-bottom:1.25rem; font-size:1.05rem; }
  .about-text p strong { color:var(--text); font-weight:600; }
  .about-strengths { display:flex; flex-direction:column; gap:1rem; }
  /* PREMIUM FLOATING CARDS */
  .strength-card {
    padding:1.25rem 1.5rem;
    background:rgba(255,255,255,0.28); 
    border:2px solid transparent;
    background-image: linear-gradient(rgba(255,255,255,0.28), rgba(255,255,255,0.28)), linear-gradient(135deg, rgba(139,92,246,0.4), rgba(56,189,248,0.3), rgba(6,182,212,0.2));
    background-origin: border-box;
    background-clip: padding-box, border-box;
    border-radius:12px; 
    position:relative; 
    overflow:hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    will-change: transform, box-shadow, filter;
    transition: border-color 0.4s cubic-bezier(0.34,1.56,0.64,1), transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease, filter 0.4s ease;
    box-shadow: 0 8px 32px rgba(139,92,246,0.12), inset 0 1px 0 rgba(255,255,255,0.2);
  }

  /* Floating default animation - each card has different timing */
  .strength-card.card-float-1 { animation: floatCard 4s ease-in-out infinite; }
  .strength-card.card-float-2 { animation: floatCard 5s ease-in-out infinite; }
  .strength-card.card-float-3 { animation: floatCard 6s ease-in-out infinite; }
  .strength-card.card-float-4 { animation: floatCard 4.5s ease-in-out infinite; }

  @keyframes floatCard {
    0%, 100% { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
    25% { transform: translateY(-8px) rotateX(1deg) rotateY(-1deg); }
    50% { transform: translateY(-6px) rotateX(1.5deg) rotateY(1deg); }
    75% { transform: translateY(-7px) rotateX(0.5deg) rotateY(-0.5deg); }
  }

  .strength-card:hover {
    border-color: rgba(139,92,246,0.6);
    transform: translateY(-15px) scale(1.03) rotateX(var(--rot-x, 0deg)) rotateY(var(--rot-y, 0deg));
    animation: none;
    box-shadow: 0 20px 60px rgba(139,92,246,0.25), 
                0 0 40px rgba(56,189,248,0.15),
                inset 0 1px 0 rgba(255,255,255,0.3),
                inset 0 0 30px rgba(139,92,246,0.1);
  }

  /* Cursor glow inside card */
  .strength-card::after {
    content:''; 
    position:absolute; 
    pointer-events:none;
    border-radius:50%;
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 1;
  }

  .strength-card:hover::after {
    opacity: 0.25;
    width: 200px;
    height: 200px;
    left: var(--glow-x, 50px);
    top: var(--glow-y, 50px);
    background: radial-gradient(circle, rgba(139,92,246,0.3) 0%, rgba(56,189,248,0.1) 50%, transparent 100%);
    transition: left 0.05s ease-out, top 0.05s ease-out, opacity 0.3s ease;
  }

  /* Border shimmer animation */
  @keyframes borderShimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .strength-card:hover {

  /* EXPERIENCE */
  .exp-bg { background:linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(56,189,248,0.05) 100%); }
  .exp-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
  
  /* PREMIUM FLOATING EXPERIENCE CARDS */
  .exp-card {
    background:rgba(255,255,255,0.28); 
    border:2px solid transparent;
    background-image: linear-gradient(rgba(255,255,255,0.28), rgba(255,255,255,0.28)), linear-gradient(135deg, rgba(139,92,246,0.4), rgba(56,189,248,0.3), rgba(6,182,212,0.2));
    background-origin: border-box;
    background-clip: padding-box, border-box;
    border-radius:12px; 
    padding:1.75rem;
    position:relative; 
    overflow:hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    will-change: transform, box-shadow, filter;
    transition: border-color 0.4s cubic-bezier(0.34,1.56,0.64,1), transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease, filter 0.4s ease, backdrop-filter 0.4s ease;
    box-shadow: 0 8px 32px rgba(139,92,246,0.12), inset 0 1px 0 rgba(255,255,255,0.2);
    z-index: 1;
  }

  /* Floating default animation - each card has different timing */
  .exp-card.card-float-1 { animation: floatExpCard 4s ease-in-out infinite; }
  .exp-card.card-float-2 { animation: floatExpCard 5s ease-in-out infinite; }
  .exp-card.card-float-3 { animation: floatExpCard 6s ease-in-out infinite; }
  .exp-card.card-float-4 { animation: floatExpCard 7s ease-in-out infinite; }

  @keyframes floatExpCard {
    0%, 100% { transform: translateY(0px) translateX(0px) rotateX(0deg) rotateY(0deg); }
    25% { transform: translateY(-10px) translateX(-3px) rotateX(1.5deg) rotateY(-1.5deg); }
    50% { transform: translateY(-8px) translateX(2px) rotateX(1deg) rotateY(1deg); }
    75% { transform: translateY(-9px) translateX(-2px) rotateX(0.5deg) rotateY(-0.5deg); }
  }

  /* Entrance animation */
  @keyframes expCardEnter {
    0% {
      opacity: 0;
      transform: translateY(80px) scale(0.95);
    }
    100% {
      opacity: 1;
      transform: translateY(0px) scale(1);
    }
  }

  .exp-card.reveal {
    animation: expCardEnter 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  .exp-card.reveal-delay-1 { animation-delay: 0ms; }
  .exp-card.reveal-delay-2 { animation-delay: 200ms; }
  .exp-card.reveal-delay-3 { animation-delay: 400ms; }

  /* Exit animation */
  @keyframes expCardExit {
    from {
      opacity: 1;
      transform: translateY(0px);
    }
    to {
      opacity: 0.5;
      transform: translateY(30px);
    }
  }

    opacity: 0;

  /* GALAXY STAR FIELD EFFECT */
  .stars-container {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }

  /* Background Layer - Very tiny, faint stars */
  .star.layer-bg {
    opacity: 0.3;
    filter: blur(0.3px);
  }

  /* Mid Layer - Slightly brighter stars */
  .star.layer-mid {
    opacity: 0.5;
    filter: blur(0.15px);
  }

  /* Front Layer - Glowing stars */
  .star.layer-front {
    opacity: 0.7;
    filter: blur(1px);
  }

  /* Twinkling animations with varying speeds */
  @keyframes twinkle1 {
    0%, 100% { opacity: var(--opacity-min); }
    50% { opacity: var(--opacity-max); }
  }

  @keyframes twinkle2 {
    0%, 100% { opacity: var(--opacity-min); }
    25%, 75% { opacity: var(--opacity-max); }
  }

  @keyframes twinkle3 {
    0%, 100% { opacity: var(--opacity-min); }
    33%, 66% { opacity: var(--opacity-max); }
  }

  @keyframes twinklePulse {
    0%, 100% { 
      opacity: var(--opacity-min);
      transform: scale(1);
    }
    50% { 
      opacity: var(--opacity-max);
      transform: scale(1.3);
    }
  }

  .star.twinkle1 { animation: twinkle1 var(--duration) ease-in-out infinite; }
  .star.twinkle2 { animation: twinkle2 var(--duration) ease-in-out infinite; }
  .star.twinkle3 { animation: twinkle3 var(--duration) ease-in-out infinite; }
  .star.twinklePulse { animation: twinklePulse var(--duration) ease-in-out infinite; }

  /* Aurora-colored stars */

  .star.color-white {

  /* Shooting star */
  .shooting-star {
    position: absolute;
    width: 2px;
    height: 80px;
    background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(56,189,248,0.2));
    pointer-events: none;
    filter: blur(1px);
    z-index: 2;
  }

  @keyframes shootingStar {
    0% {
      transform: translateX(-100vw) translateY(-100vh) rotate(45deg);
      opacity: 1;
    }
    100% {
      transform: translateX(100vw) translateY(100vh) rotate(45deg);
      opacity: 0;
    }

  .shooting-star.active {
    animation: shootingStar var(--shoot-duration) ease-in infinite;

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// GALAXY STAR FIELD GENERATION
function initializeStars() {
  const container = document.getElementById('starsContainer');
  if (!container) return;

  const layers = [
    { name: 'layer-bg', count: 40, minSize: 0.5, maxSize: 1.2, minOpacity: 0.2, maxOpacity: 0.4 },
    { name: 'layer-mid', count: 35, minSize: 1, maxSize: 2, minOpacity: 0.35, maxOpacity: 0.6 },
    { name: 'layer-front', count: 25, minSize: 1.5, maxSize: 3, minOpacity: 0.5, maxOpacity: 0.8 }
  ];

  const colors = ['color-white', 'color-white', 'color-white', 'color-white', 'color-white', 'color-white', 'color-white', 'color-purple', 'color-blue', 'color-cyan'];
  const tweaks = ['twinkle1', 'twinkle2', 'twinkle3', 'twinklePulse'];
  const durationRange = [3, 4.5, 6, 7.5, 8.5, 10];

  layers.forEach(layer => {
    for (let i = 0; i < layer.count; i++) {
      const star = document.createElement('div');
      const size = Math.random() * (layer.maxSize - layer.minSize) + layer.minSize;
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const animation = tweaks[Math.floor(Math.random() * tweaks.length)];
      const duration = durationRange[Math.floor(Math.random() * durationRange.length)];
      const minOpacity = layer.minOpacity;
      const maxOpacity = layer.maxOpacity;

      star.className = `star ${layer.name} ${color} ${animation}`;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.left = x + '%';
      star.style.top = y + '%';
      star.style.setProperty('--duration', duration + 's');
      star.style.setProperty('--opacity-min', minOpacity);
      star.style.setProperty('--opacity-max', maxOpacity);

      container.appendChild(star);
    }
  });

  // Optional: Shooting stars (one every 8-12 seconds)
  function createShootingStar() {
    const shootingStar = document.createElement('div');
    const startX = Math.random() * 100;
    const startY = Math.random() * 100;
    const duration = Math.random() * 1.5 + 2;

    shootingStar.className = 'shooting-star active';
    shootingStar.style.left = startX + '%';
    shootingStar.style.top = startY + '%';
    shootingStar.style.setProperty('--shoot-duration', duration + 's');

    container.appendChild(shootingStar);

    setTimeout(() => shootingStar.remove(), duration * 1000);
  }

  setInterval(() => {
    if (Math.random() > 0.6) {
      createShootingStar();
    }
  }, 8000 + Math.random() * 4000);
}

// PREMIUM FLOATING CARDS ENHANCEMENT
function initializeFloatingCards() {
  const cards = document.querySelectorAll('.strength-card');
  if (cards.length === 0) return;

  cards.forEach((card, index) => {
    // Add float animation class
    card.classList.add(`card-float-${(index % 4) + 1}`);

    // Add particles container
    const particlesContainer = document.createElement('div');
    particlesContainer.className = 'card-particles';
    card.insertBefore(particlesContainer, card.firstChild);

    // Add 4-5 particles per card
    const particleCount = 4 + Math.floor(Math.random() * 2);
    const colors = ['p-purple', 'p-blue', 'p-cyan'];
    
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = `card-particle ${colors[Math.floor(Math.random() * colors.length)]} p${i + 1}`;
      particle.style.left = (Math.random() * 80 + 10) + '%';
      particle.style.top = (Math.random() * 80 + 10) + '%';
      particlesContainer.appendChild(particle);
    }

    // Cursor tracking for 3D tilt and glow effect
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      // Calculate tilt based on cursor position
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateY = ((x - centerX) / rect.width) * 8;
      const rotateX = ((centerY - y) / rect.height) * 8;
      
      card.style.setProperty('--rot-x', rotateX + 'deg');
      card.style.setProperty('--rot-y', rotateY + 'deg');

      // Position glow effect
      const glowSize = 200;
      const glowX = x - glowSize / 2;
      const glowY = y - glowSize / 2;
      
      if (card.style.position !== 'relative' && card.style.position !== 'absolute') {
        card.style.position = 'relative';
      }
      
      card.style.setProperty('--glow-x', glowX + 'px');
      card.style.setProperty('--glow-y', glowY + 'px');
      
      // Update ::after pseudo element position via JavaScript (fallback styling)
      const afterStyle = `
        left: ${glowX}px !important;
        top: ${glowY}px !important;
      `;
    });

    card.addEventListener('mouseleave', () => {
      card.style.setProperty('--rot-x', '0deg');
      card.style.setProperty('--rot-y', '0deg');
    });
  });
}

// Initialize floating cards after React renders
function initializeFloatingCardsDeferred() {
  setTimeout(() => {
    initializeFloatingCards();
    initializeExperienceCards();
  }, 500);
}

// PREMIUM FLOATING EXPERIENCE CARDS
function initializeExperienceCards() {
  const cards = document.querySelectorAll('.exp-card');
  if (cards.length === 0) return;

  cards.forEach((card, index) => {
    // Add float animation class
    card.classList.add(`card-float-${(index % 4) + 1}`);

    // Add particles container
    const particlesContainer = document.createElement('div');
    particlesContainer.className = 'card-exp-particles';
    card.insertBefore(particlesContainer, card.firstChild);

    // Add 4-6 particles per card
    const particleCount = 4 + Math.floor(Math.random() * 3);
    const colors = ['ep-purple', 'ep-blue', 'ep-cyan', 'ep-white'];
    
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = `card-exp-particle ${colors[Math.floor(Math.random() * colors.length)]} ep${i + 1}`;
      particle.style.left = (Math.random() * 85 + 7.5) + '%';
      particle.style.top = (Math.random() * 85 + 7.5) + '%';
      particlesContainer.appendChild(particle);
    }

    // Cursor tracking for 3D tilt and glow effect
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      // Calculate tilt based on cursor position
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateY = ((x - centerX) / rect.width) * 10;
      const rotateX = ((centerY - y) / rect.height) * 10;
      
      card.style.setProperty('--rot-x', rotateX + 'deg');
      card.style.setProperty('--rot-y', rotateY + 'deg');

      // Position glow effect
      const glowSize = 200;
      const glowX = x - glowSize / 2;
      const glowY = y - glowSize / 2;
      
      card.style.setProperty('--glow-x', glowX + 'px');
      card.style.setProperty('--glow-y', glowY + 'px');
    });

    card.addEventListener('mouseleave', () => {
      card.style.setProperty('--rot-x', '0deg');
      card.style.setProperty('--rot-y', '0deg');
    });
  });
}

// Also watch for dynamic content
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    initializeFloatingCards();
    initializeExperienceCards();
    initializeFloatingCardsDeferred();
  });
} else {
  initializeFloatingCards();
  initializeExperienceCards();
  initializeFloatingCardsDeferred();
}

// Initialize stars when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initializeStars);
} else {
  initializeStars();

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function CursorGlow() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    let raf = null, tx = window.innerWidth/2, ty = window.innerHeight/2, cx = tx, cy = ty;
    const onMove = e => { tx = e.clientX; ty = e.clientY; };
    window.addEventListener('mousemove', onMove);
    const tick = () => {
      cx += (tx - cx) * 0.12;
      cy += (ty - cy) * 0.12;
      el.style.transform = `translate(${cx}px, ${cy}px) translate(-50%,-50%)`;
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => { window.removeEventListener('mousemove', onMove); cancelAnimationFrame(raf); };
  }, []);
  return <div className="cursor-glow" ref={ref}></div>;
}

}

function useCountUp(end, duration = 1400) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const node = ref.current;
    if (!node) return;
    const obs = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting && !started.current) {
          started.current = true;
          const startTime = performance.now();
          const step = (now) => {
            const progress = Math.min((now - startTime) / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            setVal(Math.round(eased * end));
            if (progress < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        }
      });
    }, { threshold: 0.4 });
    obs.observe(node);
    return () => obs.disconnect();
  }, [end, duration]);
  return [val, ref];
}

function Typewriter({ words, speed = 65, pause = 1400 }) {
  const [text, setText] = useState('');
  const [idx, setIdx] = useState(0);
  const [deleting, setDeleting] = useState(false);
  useEffect(() => {
    const current = words[idx % words.length];
    let timeout;
    if (!deleting && text.length < current.length) {
      timeout = setTimeout(() => setText(current.slice(0, text.length + 1)), speed);
    } else if (!deleting && text.length === current.length) {
      timeout = setTimeout(() => setDeleting(true), pause);
    } else if (deleting && text.length > 0) {
      timeout = setTimeout(() => setText(current.slice(0, text.length - 1)), speed / 1.6);
    } else if (deleting && text.length === 0) {
      setDeleting(false);
      setIdx(i => i + 1);
    }
    return () => clearTimeout(timeout);
  }, [text, deleting, idx, words, speed, pause]);
  return <span><span>{text}</span><span className="cursor-blink"></span></span>;
}

  const [isHovered, setIsHovered] = useState(false);

  const skillCategoryIcons = {
    'Languages': ['🐍', '⚙', '📘'],
    'Frameworks & Libraries': ['⚛', '⚡', '🔗'],
    'Databases': ['🐘', '🍃', '📊'],
    'Tools & Platforms': ['🐳', '🔧', '☁'],
    'Concepts': ['🧠', '📐', '🔐'],
  };
  const getOrbitingIcons = () => skillCategoryIcons[cat.title] || ['⚙', '🔧', '💻'];

  useEffect(() => {
    const node = ref.current;
    if (!node) return;
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setFilled(true); });
    }, { threshold: 0.3 });
    obs.observe(node);
    return () => obs.disconnect();
  }, []);

  const mouseX = useMotionValue(0);
  const mouseY = useMotionValue(0);

  const handleMouseMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    mouseX.set(e.clientX - rect.left);
    mouseY.set(e.clientY - rect.top);
  };

  const springConfig = { damping: 25, stiffness: 200 };
  const smoothMouseX = useSpring(mouseX, springConfig);
  const smoothMouseY = useSpring(mouseY, springConfig);

  const backgroundGlow = useMotionTemplate`radial-gradient(350px circle at ${smoothMouseX}px ${smoothMouseY}px, rgba(168, 85, 247, 0.25), transparent 80%)`;

  const floatDuration = 3 + (ci % 3);
  const floatDelay = ci * 0.4;

  return (
    <motion.div
      initial={{ opacity: 0, y: 40, scale: 0.9 }}
      whileInView={{ opacity: 1, y: 0, scale: 1 }}
      viewport={{ once: true, margin: "-50px" }}
      transition={{ duration: 0.7, delay: ci * 0.15, ease: "easeOut" }}
      className="h-full"

      <motion.div

            transformStyle: "preserve-3d"

            y: -10,

            borderColor: "rgba(168, 85, 247, 0.6)",

        >
          {/* Radial Glow */}
          <motion.div
            className="absolute inset-0 pointer-events-none z-0 mix-blend-screen"
            style={{ background: backgroundGlow, opacity: isHovered ? 1 : 0 }}

          {/* Shine Sweep */}
          <motion.div
            className="absolute top-0 bottom-0 pointer-events-none z-0"
            initial={{ left: "-100%" }}
            animate={isHovered ? { left: "200%" } : { left: "-100%" }}

            style={{
              width: "50%",
              background: "linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent)",
              transform: "skewX(-20deg)"
            }}
          />

          <div className="relative z-10">
            <div className="skill-orbiting-container">
              {getOrbitingIcons().map((icon, i) => (
                <motion.div 
                  className="skill-orbiting-icon flex items-center justify-center bg-purple-500/10 border border-purple-500/30 rounded-full"

const OrbitalProjectCard = ({ p, index, total, angleMV, isPausedRef, activeCard, setActiveCard }) => {
  const { motion, useTransform } = window.Motion;
  
  const baseAngle = (360 / total) * index;
  const cardAngleMV = useTransform(angleMV, (v) => (v + baseAngle) % 360);

  // Desktop radii for the orbital path
  const radiusX = 450;
  const radiusY = 180;

  const x = useTransform(cardAngleMV, (a) => Math.cos((a * Math.PI) / 180) * radiusX);
  const y = useTransform(cardAngleMV, (a) => Math.sin((a * Math.PI) / 180) * radiusY);

  const scale = useTransform(cardAngleMV, (a) => {
    const sin = Math.sin((a * Math.PI) / 180);
    return 1 + sin * 0.25; // Scales between 0.75 and 1.25 for depth perception
  });

  const zIndex = useTransform(cardAngleMV, (a) => {
    const sin = Math.sin((a * Math.PI) / 180);
    return Math.floor((sin + 1) * 10); // Dynamically set z-index from 0 to 20 based on orbit position
  });

  const filter = useTransform(cardAngleMV, (a) => {
    const sin = Math.sin((a * Math.PI) / 180);
    return sin < -0.3 ? `blur(${(-sin - 0.3) * 5}px)` : 'blur(0px)'; // Blur elements rotating in the background
  });

  const isActive = activeCard === index;

  return (
    <motion.div
      className="absolute top-1/2 left-1/2 w-[340px] -ml-[170px] -mt-[120px] cursor-pointer"
      style={isActive ? { zIndex: 50 } : { x, y, scale, zIndex, filter }}
      animate={isActive ? { x: 0, y: 0, scale: 1.15, filter: 'blur(0px)' } : {}}
      transition={{ type: "spring", damping: 25, stiffness: 120 }}
      onMouseEnter={() => {
        isPausedRef.current = true;
        setActiveCard(index);
      }}
      onMouseLeave={() => {
        isPausedRef.current = false;
        setActiveCard(null);
      }}
    >
      <div className={`p-6 rounded-2xl backdrop-blur-xl border transition-all duration-300 ${isActive ? 'bg-[rgba(15,23,42,0.95)] border-cyan-500/50 shadow-[0_0_40px_rgba(6,182,212,0.35)]' : 'bg-[rgba(255,255,255,0.6)] border-purple-500/30 hover:border-purple-500/60 shadow-lg'}`}>
        <div className="flex justify-between items-center mb-3">
          <span className="text-purple-500 font-mono text-sm font-bold">{p.num}</span>
          {p.badge && <span className="px-3 py-1 bg-gradient-to-r from-purple-500/10 to-cyan-500/10 text-cyan-600 text-xs rounded-full border border-cyan-500/30 font-bold tracking-wide uppercase">{p.badge}</span>}
        </div>
        <h3 className={`text-xl font-extrabold mb-3 font-syne ${isActive ? 'text-white' : 'text-slate-900'}`}>{p.title}</h3>
        
        {/* Expanded Description and Details */}
        <div className="overflow-hidden">
          <p className={`text-sm mb-4 transition-all duration-300 ${isActive ? 'text-slate-300 line-clamp-none' : 'text-slate-700 line-clamp-2 font-medium'}`}>{p.desc}</p>
          
          <motion.div 
            initial={false}
            animate={{ height: isActive ? 'auto' : 0, opacity: isActive ? 1 : 0 }}
            className="overflow-hidden"
          >
            <div className="flex flex-wrap gap-2 mb-4 pt-2">
              {p.stack.map(tech => <span key={tech} className="text-xs px-2 py-1 rounded-md bg-white/10 border border-white/20 text-slate-200">{tech}</span>)}
            </div>
            <div className="flex gap-4 mt-4 pb-1">
              <a href={p.live} target="_blank" rel="noreferrer" className="text-sm font-bold text-cyan-400 hover:text-cyan-300 flex items-center gap-1 transition-colors">Live Demo <span className="text-lg">↗</span></a>
              <a href={p.github} target="_blank" rel="noreferrer" className="text-sm font-bold text-purple-400 hover:text-purple-300 flex items-center gap-1 transition-colors">Source Code <span className="text-lg">↗</span></a>
            </div>
          </motion.div>
        </div>
      </div>
    </motion.div>
  );
};

const CodeBackground = () => {
  const snippets = React.useMemo(() => {
    return Array.from({ length: 50 }).map((_, i) => {
      const isVertical = Math.random() > 0.4;
      const isForward = Math.random() > 0.5;
      return {
        id: i,
        text: CODE_SNIPPETS[Math.floor(Math.random() * CODE_SNIPPETS.length)],
        isVertical,
        isForward,
        pos: Math.random() * 100,
        duration: Math.random() * 80 + 50,
        delay: Math.random() * -120,
        color: ['text-cyan-600', 'text-purple-600', 'text-sky-600', 'text-indigo-600', 'text-blue-600'][Math.floor(Math.random() * 5)],
        size: Math.random() * 0.4 + 0.6,
        blur: Math.random() > 0.4 ? (Math.random() * 3 + 0.5) : 0,
        opacity: Math.random() * 0.3 + 0.2
      };
    });
  }, []);

  return (
    <div className="fixed inset-0 z-0 overflow-hidden pointer-events-none select-none font-mono font-bold opacity-100" aria-hidden="true">
      {snippets.map(s => {
        let initial, animate;
        if (s.isVertical) {
          initial = { y: s.isForward ? '-20vh' : '120vh', x: `${s.pos}vw` };
          animate = { y: s.isForward ? '120vh' : '-20vh' };
        } else {
          initial = { x: s.isForward ? '-20vw' : '120vw', y: `${s.pos}vh` };
          animate = { x: s.isForward ? '120vw' : '-20vw' };
        }

        return (
          <motion.div
            key={s.id}
            className={`absolute whitespace-nowrap ${s.color}`}
            style={{
              fontSize: `${s.size}rem`,
              opacity: s.opacity,
              filter: s.blur > 0 ? `blur(${s.blur}px)` : 'none',
              textShadow: `0 0 ${s.blur > 0 ? 0 : 8}px currentColor`
            }}
            initial={initial}
            animate={animate}
            transition={{
              duration: s.duration,
              repeat: Infinity,
              ease: "linear",
              delay: s.delay
            }}
          >
            {s.text}
          </motion.div>
        );
      })}
    </div>
  );
};
